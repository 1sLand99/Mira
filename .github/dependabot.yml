version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /apps/console
    schedule:
      interval: weekly
      day: monday
      time: '04:15'
    labels:
      - dependencies
      - javascript
    groups:
      console-dependencies:
        patterns:
          - '*'

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
    labels:
      - dependencies
      - python

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:45'
    labels:
      - dependencies
      - android
